apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nbiot-detector
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'git@github.com:sweetiu172/nbiot_detector.git'
    targetRevision: main
    path: './k8s/overlays/prod'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: nbiot-detector
  syncPolicy:
    automated:
      prune: true
      selfHeal: true