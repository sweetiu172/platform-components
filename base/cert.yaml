apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: private-tls
  namespace: kube-system # Must match Gateway namespace
spec:
  secretName: private-tls-secret # The secret name Gateway will look for
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - "*.tuan-lnm.org"