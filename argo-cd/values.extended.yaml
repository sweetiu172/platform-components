nameOverride: argo-cd
redis-ha:
  enabled: false

controller:
  replicas: 1

server:
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
  extraArgs:
  - --insecure

repoServer:
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2

applicationSet:
  replicas: 1
  

